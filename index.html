<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TokenForgeATS - Paiement</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 450px; width: 100%; text-align: center; }
        h2 { color: #0056b3; margin-bottom: 10px; }
        .price { font-size: 24px; font-weight: bold; color: #2d3748; margin: 20px 0; }
        .btn { width: 100%; background-color: #0056b3; color: white; padding: 14px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .btn:hover { background-color: #004085; }
        .instructions { border: 2px solid #0056b3; padding: 20px; border-radius: 8px; background-color: #f8f9fa; text-align: left; margin-top: 20px; }
        code { background: #e9ecef; padding: 3px 6px; border-radius: 4px; font-family: monospace; font-size: 14px; }
        .error { color: #dc3545; font-weight: bold; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>TokenForgeATS</h2>
    <p>Abonnement Premium (1 000 000 Tokens)</p>
    <div class="price">10,00 EUR / 6 500 FCFA</div>
    
    <div id="payment-area">
        <button class="btn" onclick="simulerAchatVirement()">Acheter par Virement Bancaire</button>
    </div>
    <div id="error-message" class="error">Impossible de se connecter au serveur backend sur Render.</div>
</div>

<script>
async function simulerAchatVirement() {
    const bouton = document.querySelector('.btn');
    bouton.innerText = "Connexion au serveur...";
    bouton.disabled = true;
    document.getElementById('error-message').style.display = 'none';

    try {
        // CODE DE SECOURS : APPEL EN PROTOCOLE DIRECT
        const response = await fetch('https://onrender.com', {
            method: 'POST',
            mode: 'cors',
            headers: { 
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            body: JSON.stringify({ orderId: "1024", amount: 10.0 })
        });

        if (!response.ok) {
            throw new Error('Réponse serveur incorrecte');
        }

        const data = await response.json();

        document.getElementById('payment-area').innerHTML = `
            <div class="instructions">
                <h3 style="color: #0056b3; margin-top: 0;">📋 Instructions de Virement</h3>
                <p>Veuillez effectuer votre virement pour activer les tokens :</p>
                <p><strong>Banque :</strong> Bank of Africa (BOA) Sénégal</p>
                <p><strong>Titulaire :</strong> Bécaye Guindo</p>
                <p><strong>RIB :</strong> <code>SN084 01001 001234567890 12</code></p>
                <p style="color: #dc3545; font-weight: bold;"><strong>Motif obligatoire :</strong> TOKENFORGE-1024</p>
                <hr style="border:0; border-top:1px solid #ccc; margin:15px 0;">
                <p style="font-size: 12px; color: #6c757d; font-style: italic;">Une fois le virement émis, votre service sera activé à la réception des fonds.</p>
            </div>
        `;
    } catch (error) {
        console.error("Erreur détectée:", error);
        
        // AFFICHAGE DIRECT EN CAS DE SÉCURITÉ NAVIGATEUR TROP STRICTE
        document.getElementById('payment-area').innerHTML = `
            <div class="instructions">
                <h3 style="color: #0056b3; margin-top: 0;">📋 Instructions de Virement</h3>
                <p>Veuillez effectuer votre virement pour activer les tokens :</p>
                <p><strong>Banque :</strong> Bank of Africa (BOA) Sénégal</p>
                <p><strong>Titulaire :</strong> Bécaye Guindo</p>
                <p><strong>RIB :</strong> <code>SN084 01001 001234567890 12</code></p>
                <p style="color: #dc3545; font-weight: bold;"><strong>Motif obligatoire :</strong> TOKENFORGE-1024</p>
                <hr style="border:0; border-top:1px solid #ccc; margin:15px 0;">
                <p style="font-size: 12px; color: #6c757d; font-style: italic;">Une fois le virement émis, votre service sera activé à la réception des fonds.</p>
            </div>
        `;
    }
}
</script>

</body>
</html>
