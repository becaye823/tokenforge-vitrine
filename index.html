<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TokenForgeATS - Plateforme IA</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 450px; width: 100%; text-align: center; margin-bottom: 20px; }
        h2 { color: #0056b3; margin-top: 0; }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; background-color: #0056b3; color: white; padding: 12px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .btn:hover { background-color: #004085; }
        .btn-success { background-color: #28a745; }
        .btn-success:hover { background-color: #218838; }
        .instructions { border: 2px solid #0056b3; padding: 15px; border-radius: 8px; background-color: #f8f9fa; text-align: left; }
        code { background: #e9ecef; padding: 3px 6px; border-radius: 4px; font-family: monospace; }
        .hidden { display: none; }
        .status { font-weight: bold; color: #0056b3; margin: 10px 0; }
    </style>
</head>
<body>

<!-- 1. BLOC AUTHENTIFICATION (CONNEXION / INSCRIPTION) -->
<div id="auth-section" class="card">
    <h2>Connexion TokenForgeATS</h2>
    <input type="email" id="auth-email" placeholder="Votre adresse e-mail">
    <input type="password" id="auth-password" placeholder="Votre mot de passe">
    <button class="btn" onclick="gererAuthentification('login')">Se connecter</button>
    <p style="margin: 10px 0; font-size: 14px;">Ou</p>
    <button class="btn btn-success" onclick="gererAuthentification('signup')">Créer un compte (+10k tokens gratuits)</button>
</div>

<!-- 2. BLOC TABLEAU DE BORD & TRADUCTION IA -->
<div id="app-section" class="card hidden">
    <h2>Espace Membre IA</h2>
    <p>Connecté en tant que : <strong id="user-display"></strong></p>
    <p>Solde actuel : <strong id="balance-display">0</strong> tokens</p>
    <hr>
    <h3>Moteur de Traduction IA</h3>
    <textarea id="text-to-translate" rows="3" placeholder="Écrivez le texte à traduire..."></textarea>
    <select id="target-lang">
        <option value="en">Anglais (EN)</option>
        <option value="es">Espagnol (ES)</option>
        <option value="ar">Arabe (AR)</option>
    </select>
    <button class="btn" onclick="traduireTexteIA()">Traduire avec l'IA</button>
    <div id="translation-result" class="status"></div>
    <hr>
    <button class="btn btn-success" onclick="afficherBlocAchat()">Recharger mes Tokens</button>
</div>

<!-- 3. BLOC ACHAT (VOTRE VIREMENT BOA) -->
<div id="payment-section" class="card hidden">
    <h2>Recharge Premium</h2>
    <p>Abonnement Premium (1 000 000 Tokens)</p>
    <p style="font-size: 20px; font-weight: bold;">10,00 EUR / 6 500 FCFA</p>
    <button class="btn" onclick="demanderVirementBOA()">Générer le bon de virement BOA</button>
    <div id="payment-area"></div>
    <br>
    <button class="btn" style="background-color: #6c757d;" onclick="retourEspaceMembre()">Retour</button>
</div>

<script>
    const BACKEND_URL = "https://onrender.com";
    let sessionEmail = "";

    async function gererAuthentification(action) {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;
        if(!email || !password) return alert("Veuillez remplir tous les champs.");

        try {
            const response = await fetch(`${BACKEND_URL}/api/v1/auth/${action}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await response.json();
            
            if(response.ok && data.success) {
                alert(data.message);
                if(action === 'login') {
                    sessionEmail = data.email;
                    document.getElementById('user-display').innerText = data.email;
                    document.getElementById('balance-display').innerText = data.token_balance;
                    document.getElementById('auth-section').classList.add('hidden');
                    document.getElementById('app-section').classList.remove('hidden');
                }
            } else {
                alert(data.detail || "Une erreur est survenue.");
            }
        } catch (error) {
            alert("Erreur de connexion au serveur Render.");
        }
    }

    async function traduireTexteIA() {
        const texte = document.getElementById('text-to-translate').value;
        const langue = document.getElementById('target-lang').value;
        const resultatDiv = document.getElementById('translation-result');
        if(!texte) return alert("Veuillez écrire un texte.");

        resultatDiv.innerText = "L'IA réfléchit...";

        try {
            const response = await fetch(`${BACKEND_URL}/api/v1/translate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: sessionEmail, texte_a_traduire: texte, langue_cible: langue })
            });
            const data = await response.json();
            
            if(response.ok && data.success) {
                resultatDiv.innerHTML = `<p style="color:green;"><strong>Traduction :</strong> ${data.texte_traduit}</p><small>Tokens consommés : ${data.tokens_deduits}</small>`;
                document.getElementById('balance-display').innerText = data.nouveau_solde_restant;
            } else {
                resultatDiv.innerText = data.detail || "Erreur de traduction.";
            }
        } catch (error) {
            resultatDiv.innerText = "Erreur réseau.";
        }
    }

    async function demanderVirementBOA() {
        try {
            const response = await fetch(`${BACKEND_URL}/api/checkout-virement`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ orderId: "1024", amount: 10.0 })
            });
            const data = await response.json();

            if (data.success) {
                document.getElementById('payment-area').innerHTML = `
                    <div class="instructions" style="margin-top:15px;">
                        <h3 style="color:#0056b3;margin-top:0;">📋 Instructions de Virement</h3>
                        <p><strong>Banque :</strong> ${data.instructions.banque}</p>
                        <p><strong>Titulaire :</strong> ${data.instructions.titulaire}</p>
                        <p><strong>RIB :</strong> <code>${data.instructions.rib}</code></p>
                        <p style="color:#dc3545;font-weight:bold;"><strong>Motif :</strong> ${data.instructions.motif_obligatoire}</p>
                    </div>
                `;
            }
        } catch (error) {
            alert("Erreur de récupération des données bancaires.");
        }
    }

    function afficherBlocAchat() { document.getElementById('app-section').classList.add('hidden'); document.getElementById('payment-section').classList.remove('hidden'); }
    function retourEspaceMembre() { document.getElementById('payment-section').classList.add('hidden'); document.getElementById('app-section').classList.remove('hidden'); document.getElementById('payment-area').innerHTML=""; }
</script>

</body>
</html>
