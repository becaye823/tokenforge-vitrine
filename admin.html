<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Console Admin - TokenForge</title>
    <style>
        body { font-family: sans-serif; background: #f8f9fa; padding: 30px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #0056b3; color: white; }
        .btn-voir { background: #28a745; color: white; padding: 6px 12px; border-radius: 4px; text-decoration: none; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔑 Tableau de Bord Administrateur - Reçus BOA</h2>
        <button id="btn-charger" style="padding: 10px 20px; background: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
            🔄 Recharger les reçus clients
        </button>
        
        <div id="statut"></div>
        
        <table>
            <thead>
                <tr>
                    <th>Nom du Fichier (ID Commande)</th>
                    <th>Date de Dépôt</th>
                    <th>Taille</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr>
                    <td colspan="4" style="text-align: center; color: #666;">Cliquez sur charger pour voir les fichiers.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        document.getElementById("btn-charger").addEventListener("click", async () => {
            const tbody = document.getElementById("table-body");
            const statut = document.getElementById("statut");
            statut.innerHTML = "<p>Chargement des documents sur Supabase Storage...</p>";
            
            try {
                const response = await fetch("https://onrender.com", {
                    method: "GET",
                    headers: {
                        // REMPLACEZ ICI PAR VOTRE VRAIE CLÉ OPENAI POUR SÉCURISER L'ACCÈS
                        "api-key": "VOTRE_SECRET_OPENAI_API_KEY" 
                    }
                });
                
                const data = await response.json();
                statut.innerHTML = "";
                tbody.innerHTML = "";
                
                if(data.recus && data.recus.length > 0) {
                    data.recus.forEach(recu => {
                        tbody.innerHTML += `
                            <tr>
                                <td><strong>${recu.nom_fichier}</strong></td>
                                <td>${new Date(recu.cree_le).toLocaleString()}</td>
                                <td>${recu.taille_ko} Base Ko</td>
                                <td><a href="${recu.url_visualisation}" target="_blank" class="btn-voir">👁️ Ouvrir le Reçu</a></td>
                            </tr>
                        `;
                    });
                } else {
                    tbody.innerHTML = "<tr><td colspan='4' style='text-align: center;'>Aucun reçu déposé pour le moment.</td></tr>";
                }
            } catch (error) {
                statut.innerHTML = "<p style='color: red;'>Erreur d'authentification ou serveur injoignable.</p>";
            }
        });
    </script>
</body>
</html>
